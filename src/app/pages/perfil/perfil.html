<section class="container py-5">
  <ng-container *ngIf="usuarioActual; else sinSesion">
    <div class="row justify-content-center">
      <div class="col-12 col-lg-7">
        <div class="card border-0 shadow-sm formulario-card">
          <div class="card-body p-4">
            <h1 class="fw-bold mb-3">Modificar perfil</h1>

            <p class="text-muted">
              Edita los datos básicos del usuario logueado.
            </p>

            <form [formGroup]="formPerfil" (ngSubmit)="guardar()">
              <div class="mb-3">
                <label class="form-label">Nombre completo</label>
                <input type="text" class="form-control" formControlName="nombreCompleto">
              </div>

              <div class="mb-3">
                <label class="form-label">Nombre de usuario</label>
                <input type="text" class="form-control" formControlName="nombreUsuario">
              </div>

              <div class="mb-3">
                <label class="form-label">Correo</label>
                <input type="email" class="form-control" formControlName="correo">
              </div>

              <div class="mb-3">
                <label class="form-label">Fecha de nacimiento</label>
                <input type="date" class="form-control" formControlName="fechaNacimiento">
              </div>

              <div class="mb-4">
                <label class="form-label">Dirección</label>
                <input type="text" class="form-control" formControlName="direccion">
              </div>

              <button type="submit" class="btn btn-primary w-100">
                Guardar cambios
              </button>
            </form>

            <div *ngIf="guardado" class="alert alert-success mt-4">
              Perfil actualizado correctamente.
            </div>
          </div>
        </div>
      </div>
    </div>
  </ng-container>

  <ng-template #sinSesion>
    <div class="alert alert-warning">
      Debes iniciar sesión para modificar tu perfil.
      <a routerLink="/login">Ir al login</a>
    </div>
  </ng-template>
</section>
