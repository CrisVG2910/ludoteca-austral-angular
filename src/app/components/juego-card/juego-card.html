<article class="card h-100 border-0 shadow-sm juego-card">
  <div class="juego-cover">
    <span>{{ juego.nombre.charAt(0) }}</span>
  </div>

  <div class="card-body d-flex flex-column">
    <div class="d-flex justify-content-between align-items-start gap-2 mb-2">
      <h5 class="card-title fw-bold mb-0">
        {{ juego.nombre }}
      </h5>

      <span *ngIf="juego.destacado" class="badge text-bg-warning">
        Destacado
      </span>
    </div>

    <p class="text-muted small mb-2">
      {{ juego.categoria }}
    </p>

    <p class="card-text flex-grow-1">
      {{ juego.descripcion }}
    </p>

    <p class="fw-bold fs-5 mb-2">
      {{ juego.precio | currency:'CLP':'symbol':'1.0-0' }}
    </p>

    <p
      class="small mb-3"
      [ngClass]="juego.stock > 0 ? 'text-success' : 'text-danger'">
      Stock disponible: {{ juego.stock }}
    </p>

    <div class="d-grid gap-2">
      <a [routerLink]="['/juego', juego.id]" class="btn btn-primary">
        Ver detalle
      </a>

      <button type="button" class="btn btn-outline-secondary" (click)="seleccionarJuego()">
        Agregar al carrito
      </button>
    </div>
  </div>
</article>
